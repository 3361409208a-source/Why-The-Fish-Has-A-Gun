<!DOCTYPE html>
<html lang="zh-CN" style="background-color: #000 !important;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>这鱼不对劲 - 调试版本</title>
    <style>
        body, html {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
            background: #000 !important;
        }
        canvas {
            display: block;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 10 !important;
            background: transparent !important; /* 核心修正：确保画布背景不遮挡视频 */
        }
        video#bg-video {
            position: fixed !important;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1 !important; /* 视频在 Body 之上，Canvas 之下 */
            background-color: #000 !important;
        }
        /* 强制横屏：手机竖着拿时，旋转整个页面 90° */
        html.forced-landscape body {
            width: 100vh !important;
            height: 100vw !important;
            transform: rotate(90deg) !important;
            transform-origin: 0 0 !important;
            position: absolute !important;
            top: 0 !important;
            left: 100vw !important;
        }
        html.forced-landscape canvas {
            width: 100vh !important;
            height: 100vw !important;
        }
        html.forced-landscape video#bg-video {
            width: 100vh !important;
            height: 100vw !important;
        }
    </style>
</head>
<body style="background-color: #000 !important;">
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
