<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #333; display: flex; flex-wrap: wrap; gap: 20px; }
        canvas { background: transparent; border: 1px solid #555; }
        .label { color: white; font-family: sans-serif; margin-bottom: 5px; }
        .container { display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="label">bg_ocean.jpg (1280x720)</div>
        <canvas id="bg_ocean" width="1280" height="720"></canvas>
    </div>
    <div class="container">
        <div class="label">fish_tuna.png (256x128)</div>
        <canvas id="fish_tuna" width="256" height="128"></canvas>
    </div>
    <div class="container">
        <div class="label">bullet_laser.png (64x16)</div>
        <canvas id="bullet_laser" width="64" height="16"></canvas>
    </div>
    <div class="container">
        <div class="label">item_core.png (64x64)</div>
        <canvas id="item_core" width="64" height="64"></canvas>
    </div>

    <script>
        function drawBg() {
            const ctx = document.getElementById('bg_ocean').getContext('2d');
            const grad = ctx.createLinearGradient(0, 0, 0, 720);
            grad.addColorStop(0, '#001a33');
            grad.addColorStop(1, '#00050a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 1280, 720);

            // Add some "tech" silhouettes
            ctx.fillStyle = 'rgba(0, 40, 80, 0.3)';
            for(let i=0; i<5; i++) {
                ctx.fillRect(Math.random()*1280, 400 + Math.random()*200, 100 + Math.random()*200, 300);
            }
            
            // Bioluminescent dots
            for(let i=0; i<50; i++) {
                ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
                ctx.beginPath();
                ctx.arc(Math.random()*1280, Math.random()*720, Math.random()*3, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function drawFish() {
            const ctx = document.getElementById('fish_tuna').getContext('2d');
            // Body
            ctx.fillStyle = '#888';
            ctx.beginPath();
            ctx.ellipse(128, 64, 100, 40, 0, 0, Math.PI * 2);
            ctx.fill();
            // Metal look
            const grad = ctx.createLinearGradient(28, 64, 228, 64);
            grad.addColorStop(0, '#555');
            grad.addColorStop(0.5, '#aaa');
            grad.addColorStop(1, '#333');
            ctx.fillStyle = grad;
            ctx.globalCompositeOperation = 'source-atop';
            ctx.fillRect(0,0,256,128);
            ctx.globalCompositeOperation = 'source-over';
            
            // Tech lines
            ctx.strokeStyle = '#00f0ff';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00f0ff';
            ctx.beginPath();
            ctx.moveTo(60, 64); ctx.lineTo(180, 64);
            ctx.moveTo(80, 40); ctx.lineTo(160, 40);
            ctx.stroke();
            
            // Eye
            ctx.fillStyle = '#ff3300';
            ctx.beginPath();
            ctx.arc(200, 55, 5, 0, Math.PI*2);
            ctx.fill();
        }

        function drawBullet() {
            const ctx = document.getElementById('bullet_laser').getContext('2d');
            const grad = ctx.createLinearGradient(0, 8, 64, 8);
            grad.addColorStop(0, 'rgba(0, 255, 255, 0)');
            grad.addColorStop(0.5, '#fff');
            grad.addColorStop(1, 'rgba(0, 255, 255, 0.8)');
            ctx.fillStyle = grad;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00f0ff';
            ctx.fillRect(0, 4, 64, 8);
        }

        function drawCore() {
            const ctx = document.getElementById('item_core').getContext('2d');
            ctx.translate(32, 32);
            ctx.rotate(Math.PI / 4);
            const grad = ctx.createRadialGradient(0, 0, 5, 0, 0, 30);
            grad.addColorStop(0, '#fff');
            grad.addColorStop(0.4, '#0f0');
            grad.addColorStop(1, 'rgba(0, 255, 0, 0)');
            ctx.fillStyle = grad;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#0f0';
            ctx.fillRect(-20, -20, 40, 40);
        }

        drawBg();
        drawFish();
        drawBullet();
        drawCore();
    </script>
</body>
</html>
